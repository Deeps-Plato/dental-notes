<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dental Notes - Review</title>
    <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/review.js" defer></script>
</head>
<body class="review-body">
    <header>
        <h1>Dental Notes</h1>
        <div class="status-bar">
            <a href="/sessions" class="btn-link">Sessions</a>
        </div>
    </header>

    <main>
        <!-- Regeneration banner (hidden by default, shown by JS when transcript changes) -->
        <div id="regen-banner" class="regen-banner" style="display: none;">
            Transcript changed -- Regenerate note?
            <button class="btn btn-regen-inline"
                    hx-post="/session/{{ session_id }}/extract"
                    hx-target="#note-panel"
                    hx-swap="innerHTML"
                    hx-indicator="#extraction-spinner">
                Regenerate
            </button>
        </div>

        <form id="review-form">
            <div class="review-container">
                <!-- Left panel: Transcript -->
                <div class="review-panel transcript-panel">
                    <div class="panel-header">
                        <h2>Transcript</h2>
                        <div class="panel-header-actions">
                            <button type="button" class="btn-icon btn-dictate" onclick="toggleDictation('transcript-edit')" title="Dictate into transcript">
                                <span class="mic-icon">&#127908;</span>
                            </button>
                            <button type="button" class="btn-icon" onclick="copyTranscript('{{ session_id }}')" title="Copy transcript">
                                <span class="copy-icon">&#128203;</span>
                            </button>
                        </div>
                    </div>
                    <div class="panel-content">
                        {% include "_review_transcript.html" %}
                    </div>
                </div>

                <!-- Right panel: Clinical Note + Patient Summary (tabbed) -->
                <div class="review-panel note-panel" data-active-tab="tab-clinical-note">
                    <div class="panel-header">
                        <div class="tab-buttons">
                            <button type="button" class="tab-btn active" data-tab="tab-clinical-note">Clinical Note</button>
                            <button type="button" class="tab-btn" data-tab="tab-patient-summary">Patient Summary</button>
                        </div>
                        <div class="panel-header-actions">
                            <!-- Re-extract with template type -->
                            <select name="template_type" id="template-type-select" class="template-select">
                                <option value="" {% if not appointment_type or appointment_type == 'general' %}selected{% endif %}>Auto-detect</option>
                                <option value="comprehensive_exam" {% if appointment_type == 'comprehensive_exam' %}selected{% endif %}>Comprehensive Exam</option>
                                <option value="restorative" {% if appointment_type == 'restorative' %}selected{% endif %}>Restorative</option>
                                <option value="hygiene_recall" {% if appointment_type == 'hygiene_recall' %}selected{% endif %}>Hygiene/Recall</option>
                                <option value="endodontic" {% if appointment_type == 'endodontic' %}selected{% endif %}>Endodontic</option>
                                <option value="oral_surgery" {% if appointment_type == 'oral_surgery' %}selected{% endif %}>Oral Surgery</option>
                            </select>
                            <button type="button" class="btn btn-copy" onclick="copyAll('{{ session_id }}')">
                                Copy All
                            </button>
                            <button type="button" class="btn btn-regen"
                                    hx-post="/session/{{ session_id }}/extract"
                                    hx-target="#note-panel"
                                    hx-swap="innerHTML"
                                    hx-include="#template-type-select"
                                    hx-indicator="#extraction-spinner">
                                Re-extract
                            </button>
                            <span id="extraction-spinner" class="htmx-indicator spinner">Extracting...</span>
                        </div>
                    </div>
                    <!-- Tab: Clinical Note -->
                    <div class="tab-content active" id="tab-clinical-note">
                        <div class="panel-content" id="note-panel">
                            {% include "_review_note.html" %}
                        </div>
                    </div>
                    <!-- Tab: Patient Summary -->
                    <div class="tab-content" id="tab-patient-summary">
                        <div class="panel-content" id="summary-panel">
                            {% include "_review_summary.html" %}
                        </div>
                    </div>
                </div>
            </div>

            <!-- Bottom action bar -->
            <div class="review-actions">
                <button type="button" class="btn btn-start"
                        hx-post="/session/{{ session_id }}/save"
                        hx-include="#review-form"
                        hx-target="#save-feedback"
                        hx-swap="innerHTML">
                    Save
                </button>
                <button type="button" class="btn btn-stop"
                        hx-post="/session/{{ session_id }}/finalize"
                        hx-confirm="This will permanently delete the transcript. Are you sure?"
                        hx-target="main"
                        hx-swap="innerHTML">
                    Finalize &amp; Clear
                </button>
                <a href="/sessions" class="btn btn-link">Back to Sessions</a>
                <span id="save-feedback"></span>
            </div>
        </form>
    </main>
</body>
</html>
