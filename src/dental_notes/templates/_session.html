{% if state == "idle" %}
<div class="controls idle">
    <button class="btn btn-start"
            hx-post="/session/start"
            hx-target="#session-controls"
            hx-swap="innerHTML">
        Start Recording
    </button>
    {% if transcript_path is defined and transcript_path %}
    <p class="transcript-saved">Transcript saved: {{ transcript_path }}</p>
    {% endif %}
</div>
<script>
    // Disconnect SSE when idle
    var area = document.getElementById("transcript-area");
    if (area) { area.removeAttribute("hx-ext"); area.removeAttribute("sse-connect"); htmx.process(area); }
</script>
{% elif state == "recording" %}
<div class="controls recording">
    <span class="recording-indicator">Recording</span>
    <button class="btn btn-pause"
            hx-post="/session/pause"
            hx-target="#session-controls"
            hx-swap="innerHTML">
        Pause
    </button>
    <button class="btn btn-stop"
            hx-post="/session/stop"
            hx-target="#session-controls"
            hx-swap="innerHTML">
        Stop
    </button>
</div>
<script>
    // Connect SSE when recording starts
    var area = document.getElementById("transcript-area");
    if (area && !area.getAttribute("sse-connect")) {
        // Clear placeholder text
        var t = document.getElementById("transcript");
        var ph = t ? t.querySelector(".placeholder") : null;
        if (ph) ph.remove();
        // Wire up SSE
        area.setAttribute("hx-ext", "sse");
        area.setAttribute("sse-connect", "/session/stream");
        var inner = document.getElementById("transcript");
        if (inner) { inner.setAttribute("sse-swap", "transcript"); inner.setAttribute("hx-swap", "beforeend"); }
        htmx.process(area);
    }
</script>
{% elif state == "paused" %}
<div class="controls paused">
    <span class="paused-indicator">Paused</span>
    <button class="btn btn-resume"
            hx-post="/session/resume"
            hx-target="#session-controls"
            hx-swap="innerHTML">
        Resume
    </button>
    <button class="btn btn-stop"
            hx-post="/session/stop"
            hx-target="#session-controls"
            hx-swap="innerHTML">
        Stop
    </button>
</div>
{% elif state == "stopping" %}
<div class="controls stopping">
    <button class="btn btn-disabled" disabled>Finalizing...</button>
</div>
{% endif %}
