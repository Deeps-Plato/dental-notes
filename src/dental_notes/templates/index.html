<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dental Notes - Session</title>
    <!-- HTMX 2.x from CDN. These are UI framework scripts, not patient data.
         CDN loading does not violate PRV-01 (which concerns patient data transmission).
         For fully air-gapped deployments, vendor these files locally. -->
    <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
    <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <h1>Dental Notes</h1>
        <div class="status-bar">
            <span class="status-indicator" id="model-status">
                {% if state != "idle" %}Model: Active{% else %}Model: Ready{% endif %}
            </span>
        </div>
    </header>

    <main>
        <!-- Microphone Selector -->
        <section class="mic-section" id="mic-section">
            <label for="mic-select">Microphone:</label>
            <select id="mic-select" name="device">
                <option value="">Default device</option>
                {% for device in devices %}
                <option value="{{ device.index }}">{{ device.name }}</option>
                {% endfor %}
            </select>
        </section>

        <!-- Appointment Type Selector -->
        <section class="mic-section" id="appt-type-section">
            <label for="appt-type-select">Appointment Type:</label>
            <select id="appt-type-select" name="appointment_type">
                <option value="general" selected>General</option>
                <option value="comprehensive_exam">Comprehensive Exam</option>
                <option value="restorative">Restorative</option>
                <option value="hygiene_recall">Hygiene/Recall</option>
                <option value="endodontic">Endodontic</option>
                <option value="oral_surgery">Oral Surgery</option>
            </select>
        </section>

        <!-- Session Controls -->
        <section class="controls-section" id="session-controls">
            {% include "_session.html" %}
        </section>

        <!-- Audio Level Indicator -->
        <section class="level-section">
            <label>Audio Level:</label>
            <div class="level-bar-container">
                <div class="level-bar" id="level-bar" style="width: 0%"></div>
            </div>
        </section>

        <!-- Transcript Display -->
        <section class="transcript-section">
            <h2>Transcript</h2>
            {% include "_transcript.html" %}
        </section>

        <!-- Transcript File Path (shown after stop) -->
        <section class="footer-info" id="footer-info">
            <p id="transcript-path"></p>
        </section>

        <!-- Saved Sessions List -->
        <section class="sessions-section">
            <h2>Saved Sessions</h2>
            {% include "_session_list.html" %}
        </section>
    </main>

    <footer>
        <div class="shortcuts">
            <strong>Keyboard Shortcuts:</strong>
            <kbd>F9</kbd> Start / Stop &nbsp;
            <kbd>F8</kbd> Pause / Resume
        </div>
    </footer>

    <script>
        // Listen for SSE level events to update the level bar
        document.body.addEventListener("level", function(event) {
            var bar = document.getElementById("level-bar");
            if (bar && event.detail) {
                var level = parseFloat(event.detail.data || event.detail) || 0;
                var width = Math.min(level * 5, 100);
                bar.style.width = width + "%";
            }
        });

        // Listen for session_end events — reset level bar
        document.body.addEventListener("session_end", function(event) {
            var bar = document.getElementById("level-bar");
            if (bar) { bar.style.width = "0%"; }
        });

        // After any HTMX swap, re-sync the mic and appointment type hidden inputs
        document.body.addEventListener("htmx:afterSwap", function(event) {
            var hidden = document.getElementById("device-input");
            var mic = document.getElementById("mic-select");
            if (hidden && mic) {
                hidden.value = mic.value;
            }
            var apptHidden = document.getElementById("appt-type-input");
            var apptType = document.getElementById("appt-type-select");
            if (apptHidden && apptType) {
                apptHidden.value = apptType.value;
            }
        });
    </script>
</body>
</html>
